# GitHub Actions: deploy to Cloudflare Pages on every push.
#
# Required repo secrets (set under Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN  - scoped to Account -> Cloudflare Pages -> Edit
#   CLOUDFLARE_ACCOUNT_ID - e0f6f68f26f8a26a75eaa793385019ef (Bearllc555@gmail.com Account)
#
# Pages project name: roofingslatepress-com (must exist; create via dashboard if first deploy).
# Production custom domain: roofingslatepress.com
#
# Branch previews: this workflow fires on EVERY branch (branches: ['**']) and omits the
# --branch flag, so wrangler-action defaults to GITHUB_REF. Result: feature branches deploy
# to <branch>.roofingslatepress-com.pages.dev preview URLs; main deploys to production.

name: Deploy to Cloudflare Pages

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=roofingslatepress-com
